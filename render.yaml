# ============================================================
# ImobPro / Complexo DMC — Blueprint GRATUITO (sem WhatsApp)
# Sobe Backend + Frontend + Banco no plano free da Render (sem cartão).
# O WhatsApp (Evolution) NÃO entra aqui — continua rodando no seu PC.
# A versão completa (com WhatsApp, paga) está em render.full.yaml.
# ============================================================

databases:
  - name: imobpro-db
    databaseName: imobpro
    user: imobpro
    region: oregon
    plan: free            # free expira em ~30 dias (dá p/ recriar ou migrar p/ Neon)

services:
  # ----- Backend (FastAPI) -----
  - type: web
    name: imobpro-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    region: oregon
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: imobpro-db, property: connectionString }
      - key: FRONTEND_ORIGIN
        value: https://imobpro-frontend.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false        # defina a senha de login no painel
      - key: GOOGLE_API_KEY
        sync: false        # opcional (Mapear mercado)
      - key: GOOGLE_CSE_ID
        sync: false
      - key: SERPER_API_KEY
        sync: false

  # ----- Frontend (Next.js) -----
  - type: web
    name: imobpro-frontend
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    region: oregon
    plan: free
    healthCheckPath: /
    envVars:
      # URL pública do backend (fixada no build do Next)
      - key: NEXT_PUBLIC_API_URL
        value: https://imobpro-backend.onrender.com
