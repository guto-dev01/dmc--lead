services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: imobpro
      POSTGRES_USER: imobpro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-imobpro123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/00-init-evolution.sql:/docker-entrypoint-initdb.d/00-init-evolution.sql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - imobpro_net

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - imobpro_net

  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    restart: always
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL:-http://localhost:8088}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-troque-esta-chave-evolution}
      AUTHENTICATION_TYPE: apikey
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://imobpro:${POSTGRES_PASSWORD:-imobpro123}@postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution_imobpro
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
      # Versao do WhatsApp Web usada pelo Baileys (evita falha de QR por versao desatualizada)
      CONFIG_SESSION_PHONE_VERSION: ${CONFIG_SESSION_PHONE_VERSION:-2.3000.1035194821}
      CONFIG_SESSION_PHONE_CLIENT: ImobPro
      CONFIG_SESSION_PHONE_NAME: Chrome
      QRCODE_LIMIT: "30"
      LOG_LEVEL: ${EVOLUTION_LOG_LEVEL:-ERROR}
      LOG_BAILEYS: ${EVOLUTION_LOG_BAILEYS:-error}
    volumes:
      - evolution_instances:/evolution/instances
    ports:
      - "8088:8080"
    depends_on:
      - postgres
      - redis
    networks:
      - imobpro_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://imobpro:${POSTGRES_PASSWORD:-imobpro123}@postgres:5432/imobpro}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-http://evolution:8080}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-troque-esta-chave-evolution}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-imobpro}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey123}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_CSE_ID: ${GOOGLE_CSE_ID:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
    ports:
      - "8001:8000"
    depends_on:
      - postgres
      - evolution
    networks:
      - imobpro_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - imobpro_net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - imobpro_net

volumes:
  postgres_data:
  redis_data:
  evolution_instances:

networks:
  imobpro_net:
    driver: bridge
